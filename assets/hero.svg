<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#1f6feb;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="56" x2="800" y2="56"/>
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
  </g>

  <!-- Accent glow bar -->
  <rect x="0" y="270" width="800" height="3" fill="url(#accent_grad)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent_grad)"/>

  <!-- Animation area (right side) -->
  
  <g transform="translate(580, 40)">
    <circle cx="100" cy="30" r="20" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="100" y="35" fill="#1f6feb" font-size="10" text-anchor="middle" font-family="monospace">GOAL</text>
    <line x1="100" y1="50" x2="55" y2="95" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="100" y1="50" x2="145" y2="95" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="55" cy="110" r="16" fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-width="1"/>
    <text x="55" y="115" fill="#1f6feb" font-size="9" text-anchor="middle" font-family="monospace">P1</text>
    <circle cx="145" cy="110" r="16" fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-width="1"/>
    <text x="145" y="115" fill="#1f6feb" font-size="9" text-anchor="middle" font-family="monospace">P2</text>
    <line x1="55" y1="126" x2="30" y2="165" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="55" y1="126" x2="80" y2="165" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="30" cy="178" r="13" fill="#1f6feb" fill-opacity="0.1" stroke="#1f6feb" stroke-width="1"/>
    <text x="30" y="182" fill="#1f6feb" font-size="8" text-anchor="middle" font-family="monospace">T1</text>
    <circle cx="80" cy="178" r="13" fill="#1f6feb" fill-opacity="0.1" stroke="#1f6feb" stroke-width="1"/>
    <text x="80" y="182" fill="#1f6feb" font-size="8" text-anchor="middle" font-family="monospace">T2</text>
  </g>

  <!-- Left: text content -->
  <!-- Package badge -->
  <rect x="40" y="38" width="110" height="22" rx="11" fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.5"/>
  <text x="95" y="53" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">darshjme</text>

  <!-- Title -->
  <text x="40" y="110" fill="#f0f6fc" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-1">agent-planner</text>

  <!-- Tagline -->
  <text x="40" y="148" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15">Task decomposition and execution planning for AI agents</text>

  <!-- Divider -->
  <line x1="40" y1="170" x2="460" y2="170" stroke="#1f6feb" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Pills -->
  
    <rect x="62" y="220" width="128" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="126" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Task Planning</text>
    <rect x="202" y="220" width="168" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="286" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Goal Decomposition</text>
    <rect x="382" y="220" width="176" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="470" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Priority Scheduling</text>
    <rect x="570" y="220" width="168" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="654" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Dynamic Replanning</text>
</svg>